<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --accent: #c8a97e;
    --accent-dim: rgba(200,169,126,0.15);
    --yes: #7eb87e;
    --yes-dim: rgba(126,184,126,0.15);
    --no: #b87e7e;
    --no-dim: rgba(184,126,126,0.15);
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 440px;
    padding: 48px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.9;
  }

  .session-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .session-code {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .who-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .who-badge:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Views ── */
  .view { display: none; width: 100%; max-width: 440px; padding: 0 24px; animation: fadeUp 0.4s ease; }
  .view.active { display: flex; flex-direction: column; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Landing ── */
  #view-landing {
    padding-top: 80px;
    align-items: center;
    text-align: center;
    gap: 12px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 12vw, 56px);
    line-height: 1.05;
    font-weight: 400;
  }

  .hero-em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-sub {
    font-size: 15px;
    color: var(--muted);
    max-width: 280px;
    line-height: 1.6;
    margin-top: 4px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 280px;
    margin-top: 32px;
  }

  .btn {
    width: 100%;
    padding: 14px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn:hover { background: var(--surface2); border-color: rgba(255,255,255,0.15); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #1a1200; font-weight: 500; }
  .btn.primary:hover { background: #d4b88a; }
  .btn.ghost { background: transparent; }

  /* ── Who are you ── */
  #view-who {
    padding-top: 60px;
    gap: 16px;
    align-items: center;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    align-self: flex-start;
  }

  .who-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }

  .who-card {
    padding: 28px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .who-card:hover { border-color: var(--accent); background: var(--accent-dim); }
  .who-card.selected { border-color: var(--accent); background: var(--accent-dim); }

  .who-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
  }

  .who-name {
    font-size: 15px;
    font-weight: 400;
  }

  /* ── Loading ── */
  #view-loading {
    padding-top: 120px;
    align-items: center;
    gap: 20px;
    text-align: center;
  }

  .spinner-ring {
    width: 48px; height: 48px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--muted);
  }

  /* ── Vote card ── */
  #view-vote { padding-top: 32px; gap: 20px; }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .meal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .meal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .meal-number {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 7vw, 34px);
    font-weight: 400;
    line-height: 1.15;
  }

  .meal-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .meal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .vote-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .vote-btn {
    padding: 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .vote-btn.yes:hover, .vote-btn.yes.active {
    background: var(--yes-dim);
    border-color: var(--yes);
    color: var(--yes);
  }
  .vote-btn.no:hover, .vote-btn.no.active {
    background: var(--no-dim);
    border-color: var(--no);
    color: var(--no);
  }

  .vote-icon { font-size: 18px; }

  .other-status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 8px;
  }

  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
  .dot.voted { background: var(--yes); }
  .dot.waiting { background: var(--muted); animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Match ── */
  #view-match {
    padding-top: 80px;
    align-items: center;
    text-align: center;
    gap: 16px;
  }

  .match-burst {
    font-size: 52px;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }

  .match-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .match-meal {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 9vw, 44px);
    font-weight: 400;
    line-height: 1.1;
  }

  .match-desc {
    font-size: 14px;
    color: var(--muted);
    max-width: 280px;
    line-height: 1.6;
  }

  .match-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 280px;
    margin-top: 16px;
  }

  /* ── Saved ── */
  #view-saved { padding-top: 32px; gap: 16px; }

  .saved-list { display: flex; flex-direction: column; gap: 8px; }

  .saved-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.2s;
  }
  .saved-item:hover { border-color: var(--accent); background: var(--accent-dim); }

  .saved-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 400;
  }

  .saved-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

  .remove-btn {
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 4px; transition: color 0.2s;
    flex-shrink: 0;
  }
  .remove-btn:hover { color: var(--no); }

  .empty-saved {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 48px 0;
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  /* ── Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    padding: 12px 24px 28px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }

  .nav-inner {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px;
  }

  .nav-btn {
    padding: 8px 20px;
    border-radius: 30px;
    border: none;
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn.active { background: var(--surface2); color: var(--text); }

  /* ── Toasts ── */
  .toast {
    position: fixed;
    top: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 100;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
    white-space: nowrap;
  }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(-8px)} }
</style>
</head>
<body>

<header>
  <div class="wordmark">Tonight</div>
  <div class="session-row">
    <span class="session-code" id="session-label"></span>
    <button class="who-badge" id="who-switcher" onclick="showView('who')" style="display:none"></button>
  </div>
</header>

<!-- Landing -->
<div class="view active" id="view-landing">
  <h1 class="hero-title">What's for<br><em class="hero-em">dinner?</em></h1>
  <p class="hero-sub">Both swipe. When you both say yes — that's tonight.</p>
  <div class="btn-group">
    <button class="btn primary" onclick="startSession()">New session</button>
    <button class="btn ghost" onclick="showView('saved')">View saved meals</button>
  </div>
</div>

<!-- Who are you -->
<div class="view" id="view-who">
  <p class="section-label">Who are you?</p>
  <div class="who-cards">
    <div class="who-card" id="card-you" onclick="selectWho('you')">
      <div class="who-avatar" style="background:rgba(200,169,126,0.15); color:var(--accent)">C</div>
      <span class="who-name">You</span>
    </div>
    <div class="who-card" id="card-robin" onclick="selectWho('robin')">
      <div class="who-avatar" style="background:rgba(126,184,126,0.12); color:var(--yes)">R</div>
      <span class="who-name">Robin</span>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="view" id="view-loading">
  <div class="spinner-ring"></div>
  <p class="loading-text">Finding tonight's options…</p>
</div>

<!-- Vote -->
<div class="view" id="view-vote">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <div class="meal-card" id="meal-card">
    <p class="meal-number" id="meal-number"></p>
    <h2 class="meal-name" id="meal-name"></h2>
    <p class="meal-desc" id="meal-desc"></p>
    <div class="meal-tags" id="meal-tags"></div>
  </div>

  <div class="vote-buttons">
    <button class="vote-btn no" id="btn-no" onclick="vote(false)">
      <span class="vote-icon">✕</span> Pass
    </button>
    <button class="vote-btn yes" id="btn-yes" onclick="vote(true)">
      <span class="vote-icon">✓</span> Yes
    </button>
  </div>

  <p class="other-status" id="other-status"></p>
</div>

<!-- Match -->
<div class="view" id="view-match">
  <div class="match-burst">🍽</div>
  <p class="match-label">Tonight's dinner</p>
  <h2 class="match-meal" id="match-meal-name"></h2>
  <p class="match-desc" id="match-meal-desc"></p>
  <div class="match-actions">
    <button class="btn primary" onclick="saveMeal()">Save this meal</button>
    <button class="btn" onclick="startSession()">Try again</button>
    <button class="btn ghost" onclick="showView('landing')">Done</button>
  </div>
</div>

<!-- Saved -->
<div class="view" id="view-saved">
  <p class="section-label">Saved meals</p>
  <div class="saved-list" id="saved-list"></div>
  <button class="btn ghost" style="margin-top:8px" onclick="showView('landing')">← Back</button>
</div>

<!-- Bottom nav (shown during voting) -->
<nav class="bottom-nav" id="bottom-nav" style="display:none">
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showView('vote')">Voting</button>
    <button class="nav-btn" onclick="showView('saved')">Saved</button>
  </div>
</nav>

<script>
// ── State ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'tonight_v1';
const MEALS_KEY   = 'tonight_meals_v1';
const VOTES_KEY   = 'tonight_votes_v1';

let state = {
  who: null,          // 'you' | 'robin'
  sessionId: null,
  meals: [],
  currentIndex: 0,
  matchedMeal: null,
};

// Demo meal pool — in production this would be AI-generated per session
const DEMO_MEALS = [
  { name: "Chicken Tikka Masala", desc: "Tender chicken in a rich, spiced tomato cream sauce. Serve with basmati and naan.", tags: ["Indian", "30 min", "Crowd-pleaser"] },
  { name: "Cacio e Pepe", desc: "Roman pasta with just pecorino, parmesan and black pepper. Deceivingly simple, utterly perfect.", tags: ["Italian", "20 min", "Vegetarian"] },
  { name: "Salmon Teriyaki", desc: "Glazed salmon fillet with sesame rice and steamed greens. Clean and satisfying.", tags: ["Japanese", "25 min", "Healthy"] },
  { name: "Beef Tacos", desc: "Spiced beef mince, pickled onion, crema, coriander. Build your own at the table.", tags: ["Mexican", "25 min", "Fun"] },
  { name: "Thai Green Curry", desc: "Creamy coconut broth with vegetables, fresh basil, a kick of green chilli.", tags: ["Thai", "35 min", "Fragrant"] },
  { name: "Mushroom Risotto", desc: "Slow-stirred arborio with mixed mushrooms, white wine and a cloud of parmesan.", tags: ["Italian", "40 min", "Vegetarian"] },
  { name: "Lamb Kofta", desc: "Spiced lamb skewers, flatbread, tzatziki, tomato salad. Feels like a proper meal.", tags: ["Mediterranean", "30 min", "Grilled"] },
  { name: "Prawn Stir-fry", desc: "Wok-tossed king prawns with ginger, garlic, pak choi, oyster sauce. Ready in minutes.", tags: ["Chinese", "15 min", "Quick"] },
  { name: "Shakshuka", desc: "Eggs poached in a smoky harissa tomato sauce. Perfect with crusty bread for mopping.", tags: ["Middle Eastern", "25 min", "Vegetarian"] },
  { name: "Roast Chicken Thighs", desc: "Crispy skin thighs with lemon, garlic and thyme. Roast veg underneath does its own thing.", tags: ["Classic", "45 min", "Minimal effort"] },
];

// Shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Views ──────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + id);
  if (el) el.classList.add('active');

  const nav = document.getElementById('bottom-nav');
  nav.style.display = (id === 'vote' || id === 'saved') ? 'flex' : 'none';

  const switcher = document.getElementById('who-switcher');
  switcher.style.display = (id === 'vote') ? 'block' : 'none';

  if (id === 'saved') renderSaved();
}

// ── Session ──────────────────────────────────────────────────────────
function startSession() {
  const id = Math.random().toString(36).slice(2,7).toUpperCase();
  state.sessionId = id;
  state.meals = shuffle(DEMO_MEALS).slice(0, 8);
  state.currentIndex = 0;
  state.matchedMeal = null;
  state.who = null;

  // Reset votes for this session
  const votes = { you: {}, robin: {} };
  localStorage.setItem(VOTES_KEY + '_' + id, JSON.stringify(votes));

  document.getElementById('session-label').textContent = 'Session ' + id;
  document.getElementById('who-switcher').textContent = '—';

  showView('who');
}

function selectWho(who) {
  state.who = who;
  document.getElementById('card-you').classList.toggle('selected', who === 'you');
  document.getElementById('card-robin').classList.toggle('selected', who === 'robin');
  document.getElementById('who-switcher').textContent = who === 'you' ? 'You' : 'Robin';

  setTimeout(() => {
    showView('loading');
    setTimeout(() => {
      showView('vote');
      renderMeal();
    }, 1400);
  }, 300);
}

// ── Voting ──────────────────────────────────────────────────────────
function getVotes() {
  const key = VOTES_KEY + '_' + state.sessionId;
  return JSON.parse(localStorage.getItem(key) || '{"you":{},"robin":{}}');
}

function saveVotes(votes) {
  const key = VOTES_KEY + '_' + state.sessionId;
  localStorage.setItem(key, JSON.stringify(votes));
}

function vote(isYes) {
  if (!state.who || state.currentIndex >= state.meals.length) return;

  const meal = state.meals[state.currentIndex];
  const votes = getVotes();
  votes[state.who][state.currentIndex] = isYes;
  saveVotes(votes);

  // Animate button
  const btn = document.getElementById(isYes ? 'btn-yes' : 'btn-no');
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 300);

  // Check for match
  if (isYes) {
    const other = state.who === 'you' ? 'robin' : 'you';
    if (votes[other][state.currentIndex] === true) {
      state.matchedMeal = meal;
      setTimeout(() => showMatch(meal), 400);
      return;
    }
  }

  // Simulate other person voting (50% chance of yes for demo feel)
  const other = state.who === 'you' ? 'robin' : 'you';
  if (votes[other][state.currentIndex] === undefined) {
    const otherVote = Math.random() > 0.55;
    votes[other][state.currentIndex] = otherVote;
    saveVotes(votes);

    // If both just voted yes → match!
    if (isYes && otherVote) {
      state.matchedMeal = meal;
      setTimeout(() => showMatch(meal), 400);
      return;
    }
  }

  // Next meal
  state.currentIndex++;
  if (state.currentIndex >= state.meals.length) {
    toast('No matches this round — starting fresh');
    state.currentIndex = 0;
    state.meals = shuffle(DEMO_MEALS).slice(0, 8);
    const fresh = { you: {}, robin: {} };
    saveVotes(fresh);
  }

  setTimeout(() => renderMeal(), 200);
}

function renderMeal() {
  const meal = state.meals[state.currentIndex];
  if (!meal) return;

  const total = state.meals.length;
  const pct = (state.currentIndex / total) * 100;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('meal-number').textContent = (state.currentIndex + 1) + ' of ' + total;
  document.getElementById('meal-name').textContent = meal.name;
  document.getElementById('meal-desc').textContent = meal.desc;

  const tagsEl = document.getElementById('meal-tags');
  tagsEl.innerHTML = meal.tags.map(t => `<span class="tag">${t}</span>`).join('');

  // Animate card
  const card = document.getElementById('meal-card');
  card.style.opacity = '0';
  card.style.transform = 'translateY(10px)';
  requestAnimationFrame(() => {
    card.style.transition = 'all 0.3s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  });

  updateOtherStatus();
}

function updateOtherStatus() {
  const other = state.who === 'you' ? 'Robin' : 'You';
  const votes = getVotes();
  const otherKey = state.who === 'you' ? 'robin' : 'you';
  const otherVoted = votes[otherKey][state.currentIndex] !== undefined;

  const el = document.getElementById('other-status');
  if (otherVoted) {
    el.innerHTML = `<span class="dot voted"></span>${other} has voted on this one`;
  } else {
    el.innerHTML = `<span class="dot waiting"></span>Waiting for ${other}…`;
  }
}

// ── Match ──────────────────────────────────────────────────────────
function showMatch(meal) {
  document.getElementById('match-meal-name').textContent = meal.name;
  document.getElementById('match-meal-desc').textContent = meal.desc;
  showView('match');
}

function saveMeal() {
  if (!state.matchedMeal) return;
  const saved = getSaved();
  const exists = saved.find(m => m.name === state.matchedMeal.name);
  if (!exists) {
    saved.push(state.matchedMeal);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    toast('Saved to your list ✓');
  } else {
    toast('Already in your saved meals');
  }
}

// ── Saved ──────────────────────────────────────────────────────────
function getSaved() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function renderSaved() {
  const saved = getSaved();
  const el = document.getElementById('saved-list');
  if (!saved.length) {
    el.innerHTML = '<p class="empty-saved">Nothing saved yet.<br>Match a meal to save it here.</p>';
    return;
  }
  el.innerHTML = saved.map((meal, i) => `
    <div class="saved-item">
      <div>
        <div class="saved-name">${meal.name}</div>
        <div class="saved-tags">${meal.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <button class="remove-btn" onclick="removeSaved(${i})" title="Remove">✕</button>
    </div>
  `).join('');
}

function removeSaved(i) {
  const saved = getSaved();
  saved.splice(i, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderSaved();
}

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ── Init ──────────────────────────────────────────────────────────
document.getElementById('session-label').textContent = '';
showView('landing');
</script>
</body>
</html>
